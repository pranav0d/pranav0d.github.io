# Welcome to your Academic Pages site config
# Replace placeholder values, then run: bundle exec jekyll serve

# Site settings
locale                   : "en-US"
title                    : "Pranav Reddy Danda"
title_separator          : "-"
name                     : &name "Pranav Reddy Danda"
description              : &description "Cybersecurity & Research Assistant — LLMs, NLP, and network security."
url                      : https://pranav0d.github.io   # change to your GitHub Pages URL
baseurl                  : ""                            # e.g. "/academicpages" if in a subpath
repository               : "pranav0d/pranav0d.github.io"

# Author / sidebar
author:
  name             : *name
  avatar           : "profile.png"
  bio              : "M.S. Cybersecurity with AI emphasis. Researching energy-efficient LLMs and applied deep learning."
  location         : "St. Louis, MO, USA"
  employer         : "Webster University"
  email            : "pranavreddydanda@gmail.com"
  uri              :
  github           : "pranav0d"
  linkedin         : "pranav-reddy-danda"
  googlescholar    :
  orcid            : "https://orcid.org/0009-0000-5585-6699"

# Build settings
markdown                 : kramdown
remote_theme             : "academicpages/academicpages.github.io"
permalink                : /:categories/:title/
paginate                 : 5
paginate_path            : /year-archive/page:num/
timezone                 : America/Chicago

include:
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README
  - log
  - node_modules
  - package.json
  - Rakefile
  - vendor

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

collections:
  publications:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
